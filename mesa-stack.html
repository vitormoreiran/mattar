<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mesa Electrolux - Stack Vivo</title>
    <link rel="stylesheet" href="./mesa-stack.css" />
  </head>
  <body>
    <main class="experience">
      <div id="artboard" class="artboard">
        <div id="vector-stack-under" class="artboard__stack artboard__stack--under"></div>

        <svg
          id="particle-layer"
          class="artboard__boids"
          viewBox="0 0 766 690"
          preserveAspectRatio="none"
          aria-hidden="true"
        >
          <g id="boid-dots"></g>
          <g id="boid-lines"></g>
          <g id="traveler-lines"></g>
          <g id="traveler-dots"></g>
        </svg>

        <div id="vector-stack-over" class="artboard__stack artboard__stack--over"></div>

        <header class="toolbar">
          <div class="toolbar__brand">
            <span class="toolbar__kicker">Mesa 3</span>
            <strong class="toolbar__title">Stack vivo</strong>
          </div>

          <div id="act-list" class="act-strip"></div>
        </header>

        <section class="panel panel--controls">
          <label class="mini-control">
            <span class="mini-control__label">Densidade de boids</span>
            <input id="density" type="range" min="20" max="100" value="72" />
            <strong id="density-value" class="mini-control__value">72</strong>
          </label>

          <label class="mini-control">
            <span class="mini-control__label">Movimento</span>
            <input id="motion" type="range" min="0" max="100" value="60" />
            <strong id="motion-value" class="mini-control__value">60</strong>
          </label>
        </section>
      </div>
    </main>

    <script src="./content/mesa-acts.js"></script>
    <script src="./content/mesa-vectors.js"></script>
    <script src="./mesa-stack.js"></script>
  </body>
</html>

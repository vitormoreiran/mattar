<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mesa Electrolux - DLA Stack</title>
    <link rel="stylesheet" href="./mesa-stack.css" />
  
    <style>
      /* Runtime fixes for vector stack and particles */
      #artboard {
        position: relative;
        isolation: isolate;
      }

      #vector-stack-under,
      #vector-stack-over,
      #scene {
        position: absolute;
        inset: 0;
      }

      #vector-stack-under {
        z-index: 1;
        pointer-events: none;
      }

      #scene {
        z-index: 2;
        pointer-events: none;
      }

      #vector-stack-over {
        z-index: 3;
        pointer-events: none;
      }

      #vector-stack-under svg,
      #vector-stack-over svg {
        overflow: visible;
      }

      #vector-stack-under svg *,
      #vector-stack-over svg * {
        vector-effect: non-scaling-stroke;
      }

      .particle,
      .particles,
      .boid,
      .boids,
      [data-particle],
      [data-particles],
      [data-boid],
      [data-boids] {
        opacity: 1 !important;
        visibility: visible !important;
        display: block !important;
      }
    </style>

  </head>
  <body>
    <main class="experience">
      <div id="artboard" class="artboard">
        <div id="vector-stack-under" class="artboard__stack artboard__stack--under"></div>
        <canvas id="scene" class="artboard__canvas"></canvas>
        <div id="vector-stack-over" class="artboard__stack artboard__stack--over"></div>

        <header class="hud hud--top">
          <div class="hud__block">
            <span class="hud__kicker">Mesa 3 / stack vivo</span>
            <strong class="hud__title">Atos e comportamento</strong>
          </div>

          <div class="hud__block hud__block--acts">
            <div id="act-list" class="act-strip"></div>
          </div>

          <div class="hud__block hud__block--tools">
            <button id="reset-scene" class="ghost-button" type="button">Regenerar</button>
            <label class="toggle-chip">
              <input id="show-vectors" type="checkbox" checked />
              <span>Stack vetorial</span>
            </label>
          </div>
        </header>

        <aside class="dock dock--controls">
          <div class="dock__head">
            <span class="dock__eyebrow">Controle vivo</span>
            <strong class="dock__title">Navegacao rapida</strong>
          </div>

          <label class="slider-card">
            <span class="slider-card__label">Pratos ativos por mesa</span>
            <input id="occupancy" type="range" min="0" max="6" value="4" />
            <strong id="occupancy-value" class="slider-card__value">4</strong>
          </label>

          <label class="slider-card">
            <span class="slider-card__label">Estabilidade</span>
            <input id="stability" type="range" min="0" max="100" value="68" />
            <strong id="stability-value" class="slider-card__value">68</strong>
          </label>

          <label class="slider-card">
            <span class="slider-card__label">Troca</span>
            <input id="exchange" type="range" min="0" max="100" value="24" />
            <strong id="exchange-value" class="slider-card__value">24</strong>
          </label>

          <label class="slider-card">
            <span class="slider-card__label">Densidade de walkers</span>
            <input id="density" type="range" min="0" max="100" value="72" />
            <strong id="density-value" class="slider-card__value">72</strong>
          </label>

          <label class="slider-card">
            <span class="slider-card__label">Velocidade de crescimento</span>
            <input id="tempo" type="range" min="0" max="100" value="74" />
            <strong id="tempo-value" class="slider-card__value">74</strong>
          </label>
        </aside>

        <aside class="dock dock--info">
          <div class="dock__head">
            <span id="hud-regime" class="dock__eyebrow"></span>
            <strong id="hud-name" class="dock__title"></strong>
          </div>

          <p id="hud-statement" class="dock__text"></p>
          <p id="act-application" class="dock__text dock__text--muted"></p>

          <div id="palette" class="palette"></div>
        </aside>

        <footer class="statusbar">
          <div class="stat">
            <span class="stat__label">Mesas</span>
            <strong id="hud-mesas" class="stat__value"></strong>
          </div>
          <div class="stat">
            <span class="stat__label">Pratos ativos</span>
            <strong id="hud-pratos" class="stat__value"></strong>
          </div>
          <div class="stat">
            <span class="stat__label">Walkers</span>
            <strong id="hud-walkers" class="stat__value"></strong>
          </div>
          <div class="stat">
            <span class="stat__label">Nos</span>
            <strong id="hud-nodes" class="stat__value"></strong>
          </div>
          <div class="stat">
            <span class="stat__label">Niveis</span>
            <strong id="fact-levels" class="stat__value">4</strong>
          </div>
        </footer>
      </div>
    </main>

    <script src="./content/mesa-acts.js"></script>
    <script src="./content/mesa-vectors.js"></script>
    <script src="./mesa-stack.js"></script>
  
    <script>
      (function () {
        const artboard = document.getElementById('artboard');
        const under = document.getElementById('vector-stack-under');
        const over = document.getElementById('vector-stack-over');
        const scene = document.getElementById('scene');

        if (artboard) {
          artboard.style.position = 'relative';
          artboard.style.isolation = 'isolate';
        }

        function numericValue(value) {
          if (value == null) return null;
          const match = String(value).match(/-?\d+(?:\.\d+)?/);
          return match ? Number(match[0]) : null;
        }

        function forceFill(root) {
          if (!root) return;

          const shapeSelector = [
            'path', 'polygon', 'polyline', 'ellipse', 'circle', 'rect', 'line'
          ].join(',');

          root.querySelectorAll(shapeSelector).forEach((node) => {
            const inlineFill = node.getAttribute('fill');
            const computedFill = window.getComputedStyle(node).fill;

            if (!inlineFill || inlineFill === 'none') {
              if (computedFill && computedFill !== 'none' && computedFill !== 'rgba(0, 0, 0, 0)') {
                node.setAttribute('fill', computedFill);
              } else {
                const parentFill = node.parentElement?.getAttribute?.('fill');
                if (parentFill && parentFill !== 'none') {
                  node.setAttribute('fill', parentFill);
                } else {
                  node.setAttribute('fill', 'currentColor');
                }
              }
            }

            node.setAttribute('stroke', 'none');
            node.style.stroke = 'none';
            node.style.strokeWidth = '0';
            node.style.paintOrder = 'fill';
          });
        }

        function reorderStackChildren(stack) {
          if (!stack) return;
          const children = Array.from(stack.children);
          if (children.length < 2) return;

          const decorated = children.map((node, index) => {
            const candidates = [
              node.getAttribute('data-order'),
              node.getAttribute('data-index'),
              node.style.zIndex,
              node.getAttribute('data-layer'),
              node.id,
              node.className
            ];

            let score = null;
            for (const candidate of candidates) {
              const value = numericValue(candidate);
              if (value !== null) {
                score = value;
                break;
              }
            }

            return { node, index, score };
          });

          const hasExplicitOrder = decorated.some((item) => item.score !== null);
          const ordered = hasExplicitOrder
            ? decorated.sort((a, b) => {
                if (a.score === null && b.score === null) return a.index - b.index;
                if (a.score === null) return 1;
                if (b.score === null) return -1;
                if (a.score !== b.score) return a.score - b.score;
                return a.index - b.index;
              })
            : decorated;

          ordered.forEach(({ node }) => stack.appendChild(node));
        }

        function reviveParticles() {
          document.querySelectorAll([
            '.particle', '.particles', '.boid', '.boids',
            '[data-particle]', '[data-particles]', '[data-boid]', '[data-boids]'
          ].join(',')).forEach((node) => {
            node.style.display = '';
            node.style.visibility = 'visible';
            node.style.opacity = '1';
            node.removeAttribute('hidden');
          });

          if (scene) {
            scene.style.opacity = '1';
            scene.style.visibility = 'visible';
            scene.style.display = 'block';
            scene.width = scene.clientWidth || scene.width;
            scene.height = scene.clientHeight || scene.height;
          }
        }

        function applyFixes(root) {
          forceFill(root || under);
          forceFill(root || over);
          reorderStackChildren(under);
          reorderStackChildren(over);
          reviveParticles();
        }

        const observer = new MutationObserver((mutations) => {
          for (const mutation of mutations) {
            if (mutation.type === 'childList' && mutation.addedNodes.length) {
              mutation.addedNodes.forEach((node) => {
                if (node.nodeType === 1) applyFixes(node);
              });
            }
            if (mutation.type === 'attributes' && mutation.target.nodeType === 1) {
              applyFixes(mutation.target);
            }
          }
        });

        [under, over, document.body].filter(Boolean).forEach((node) => {
          observer.observe(node, {
            childList: true,
            subtree: true,
            attributes: true,
            attributeFilter: ['style', 'class', 'fill', 'stroke', 'hidden', 'data-order', 'data-index', 'data-layer']
          });
        });

        window.addEventListener('load', () => applyFixes());
        document.addEventListener('DOMContentLoaded', () => applyFixes());
        setTimeout(() => applyFixes(), 120);
        setTimeout(() => applyFixes(), 600);
        setTimeout(() => applyFixes(), 1200);
      })();
    </script>

  </body>
</html>
